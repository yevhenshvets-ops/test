site_name: Spec Storage Test
site_description: Test repository for docs-as-code workflow

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - search.suggest
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

nav:
  - Home: index.md
  - Features:
      - Feature 1: features/feature-1.md
      - Feature 2: features/feature-2.md

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
